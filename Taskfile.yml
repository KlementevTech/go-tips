# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  NAMESPACE: klementevtech
  APP: gotips
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo "unknown"

  DOCKER_IMAGE: '{{.NAMESPACE}}/{{.APP}}'
  DOCKER_IMAGE_TAGGED: '{{.DOCKER_IMAGE}}:{{.VERSION}}'
  DOCKER_IMAGE_LATEST: '{{.DOCKER_IMAGE}}:latest'

  POSTGRES_USER: gotips
  POSTGRES_PASSWORD: gotips
  POSTGRES_DB: gotips
  POSTGRES_DSN: 'postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}?sslmode=disable'
  POSTGRES_DRIVER: pgx
  POSTGRES_MIGRATIONS: 'migrations/postgres'

  PPROF_ADDR: 'localhost:6060'
  PPROF_OUT_DIR: 'pprof_data'

  GOLANGCI_VERSION: v2.11.4
  BUF_VERSION: v1.68.4

tasks:
  default:
    desc: "Листинг команд"
    cmds:
      - task --list
    silent: true

  lint:check:
    desc: "Проверка линтером"
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: "Форматирование линтером"
    cmds:
      - golangci-lint run --fix

  lint:format:
    desc: "Форматирование"
    cmds:
      - gofumpt -l -w .

  test:run:
    desc: "Запуск тестов"
    cmds:
      - go test -v ./...

  test:perf:
    desc: "Запускает нагрузочный тест"
    cmds:
      - |
        docker compose -f test/k6/compose.perf.yaml \
          up \
          --abort-on-container-exit \
          --exit-code-from k6 \
          --attach k6

  test:perf:local:
    desc: "Запускает ghz нагрузочный тест"
    cmds:
      - |
        ghz --insecure \
          -i $(pwd)/api/proto \
          --proto $(pwd)/api/proto/gotips/v1/pcpart_store_service.proto \
          --call gotips.v1.PcPartStoreService/GetPcPartsRecent \
          -d '{"limit": "LIMIT_SMALL"}' \
          -n 1000000 \
          -c 500 \
          127.0.0.1:50051

  mod:tidy:
    desc: "Очистка зависимостей"
    cmds:
      - go mod tidy

  git:pre-commit:
    desc: "Запуск проверок перед коммитом"
    cmds:
      - cmd: echo "Форматирование..."
        silent: true
      - task: lint:format

      - cmd: echo "Форматирование линтером..."
        silent: true
      - task: lint:fix

      - cmd: echo "Проверка линтером..."
        silent: true
      - task: lint:check

      - cmd: echo "Проверка proto файлов..."
        silent: true
      - task: proto:lint

      - cmd: echo "Запуск тестов..."
        silent: true
      - task: test:run

      - cmd: echo "Очистка зависимостей..."
        silent: true
      - task: mod:tidy

      - cmd: echo "[OK] Все проверки пройдены."
        silent: true

  proto:gen:
    desc: "Генерирует protobuf файлы"
    cmds:
      - buf generate

  proto:lint:
    desc: "Проверка proto файлов"
    cmds:
      - buf lint

  proto:lint:changes:
    desc: "Проверка обратной совместимости proto файлов"
    cmds:
      - buf breaking --against ".git#branch=main"

  docker:build:
    desc: "Собирает Docker образ"
    cmds:
      - |
        docker build \
          --build-arg VERSION={{.VERSION}} \
          -t "{{.DOCKER_IMAGE_TAGGED}}" \
          -t "{{.DOCKER_IMAGE_LATEST}}" \
          .

  docker:run:
    desc: "Запуск Docker образа"
    cmds:
      - |
        docker run -d \
          --name gotips \
          -p 50051:50051 \
          -p 6060:6060 \
          -v config/config.dev.toml:/etc/gotips/config.toml:ro \
          klementevtech/gotips:latest

  docker:stats:
    desc: "Выводит статистику Docker"
    cmds:
      - docker stats

  compose:up:
    desc: "Поднимает окружение для разработки"
    cmds:
      - docker compose up -d

  sqlc:gen:
    desc: "Кодогенерация sqlc"
    cmds:
      - sqlc generate

  migrate:create:
    desc: "Создать миграцию. Пример: task migrate-create name=add_parts"
    vars:
      NAME: '{{.name | default "migration"}}'
    cmds:
      - goose -dir {{.POSTGRES_MIGRATIONS}} {{.POSTGRES_DRIVER}} {{.POSTGRES_DSN}} create {{.NAME}} sql
    preconditions:
      - sh: 'test -n "{{.NAME}}"'
        msg: "Ошибка: нужно указать имя. Используй: task migrate-create name=имя_миграции"

  migrate:status:
    desc: "Проверить статус миграций, инициализирует goose_db_version таблицу"
    cmds:
      - goose -dir {{.POSTGRES_MIGRATIONS}} {{.POSTGRES_DRIVER}} {{.POSTGRES_DSN}} status

  migrate:up:
    desc: "Накатить миграции"
    cmds:
      - goose -dir {{.POSTGRES_MIGRATIONS}} {{.POSTGRES_DRIVER}} {{.POSTGRES_DSN}} up

  migrate:down:
    desc: "Откатить последнюю миграцию"
    cmds:
      - goose -dir {{.POSTGRES_MIGRATIONS}} {{.POSTGRES_DRIVER}} {{.POSTGRES_DSN}} down

  migrate:reset:
    desc: "Сбросить ВСЮ базу (удалить все таблицы)"
    cmds:
      - goose -dir {{.POSTGRES_MIGRATIONS}} {{.POSTGRES_DRIVER}} {{.POSTGRES_DSN}} reset

  seeds:up:
    desc: "Наполняет Postgres тестовыми данными"
    env:
      POSTGRES_DSN: "{{.POSTGRES_DSN}}"
    cmds:
      - go run ./cmd/seeder/main.go

  install:tools:
    desc: "Установка dev инструментов"
    cmds:
      - cmd: echo "Установка линтера golangci-lint..."
        silent: true
      - task: install-linter

      - cmd: echo "Установка форматера gofumpt..."
        silent: true
      - go install mvdan.cc/gofumpt@latest

      - cmd: echo "Установка buf..."
        silent: true
      - go install github.com/bufbuild/buf/cmd/buf@{{.BUF_VERSION}}

      - cmd: echo "Установка protoc плагинов..."
        silent: true
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - cmd: echo "Установка db мигратора goose..."
        silent: true
      - go install github.com/pressly/goose/v3/cmd/goose@latest

      - cmd: echo "Установка sqlc..."
        silent: true
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - cmd: echo "[OK] Все Dev зависимости установлены."
        silent: true

  install:linter:
    desc: "Установка golangci-lint"
    cmds:
      - curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin {{.GOLANGCI_VERSION}}

  install:grpcurl:
    desc: "Установка grpcurl"
    cmds:
      - go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

  install:ghz:
    desc: "Установка ghz, нагрузочный бенч"
    cmds:
      - go install github.com/bojand/ghz/cmd/ghz@latest

  pprof:setup:
    desc: "Создать директорию для дампов"
    cmds:
      - mkdir -p {{.PPROF_OUT_DIR}}

  pprof:open:
    desc: "Открыть главную страницу pprof в браузере"
    cmds:
      - open http://{{.PPROF_ADDR}}/debug/pprof/

  pprof:heap:
    desc: "Анализ использования кучи (памяти)"
    cmds:
      - go tool pprof -http=:8080 {{.PPROF_ADDR}}/debug/pprof/heap

  pprof:cpu:
    desc: "Профилирование CPU (30 секунд) с сохранением"
    deps: [ pprof:setup ]
    cmds:
      - curl -s "{{.PPROF_ADDR}}/debug/pprof/profile?seconds=30" > {{.PPROF_OUT_DIR}}/cpu.out
      - go tool pprof -http=:8081 {{.PPROF_OUT_DIR}}/cpu.out

  pprof:allocs:
    desc: "Анализ аллокаций (где создаются объекты)"
    cmds:
      - go tool pprof -http=:8082 {{.PPROF_ADDR}}/debug/pprof/allocs

  pprof:block:
    desc: "Поиск блокировок (mutex contention)"
    cmds:
      - go tool pprof -http=:8083 {{.PPROF_ADDR}}/debug/pprof/block

  pprof:mutex:
    desc: "Поиск проблем с блокировками (mutex)"
    cmds:
      - go tool pprof -http=:8084 {{.PPROF_ADDR}}/debug/pprof/mutex

  pprof:goroutines:
    desc: "Дамп всех активных горутин (в виде текста для быстрого чека)"
    deps: [ pprof:setup ]
    cmds:
      - curl -s "http://{{.PPROF_ADDR}}/debug/pprof/goroutine?debug=1" > {{.PPROF_OUT_DIR}}/goroutines.txt
      - echo "Dump saved to {{.PPROF_OUT_DIR}}/goroutines.txt"

  pprof:check-all:
    desc: "Запустить все основные проверки (сохранение в файлы без UI)"
    deps: [ pprof:setup ]
    cmds:
      - curl -s http://{{.PPROF_ADDR}}/debug/pprof/heap > {{.PPROF_OUT_DIR}}/heap.out
      - curl -s http://{{.PPROF_ADDR}}/debug/pprof/allocs > {{.PPROF_OUT_DIR}}/allocs.out
      - curl -s http://{{.PPROF_ADDR}}/debug/pprof/block > {{.PPROF_OUT_DIR}}/block.out
      - echo "All snapshots saved to {{.PPROF_OUT_DIR}}"
