syntax = "proto3";

package catalog.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/KlementevTech/gotips/api/gen/pb/catalog/v1;catalogv1";

enum PcPartType {
  PC_PART_TYPE_UNSPECIFIED = 0;
  PC_PART_TYPE_CPU = 1;
  PC_PART_TYPE_GPU = 2;
  PC_PART_TYPE_MOTHERBOARD = 3;
  PC_PART_TYPE_RAM = 4;
  PC_PART_TYPE_STORAGE = 5;
}

message PcPart {
  string id = 1;
  string name = 2;
  optional PcPartType type = 3;
  optional string manufacturer = 4;
  int64 version = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp deleted_at = 8;
}