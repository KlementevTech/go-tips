syntax = "proto3";

package catalog.v1;

import "google/protobuf/field_mask.proto";
import "catalog/v1/pcpart.proto";

option go_package = "github.com/KlementevTech/gotips/api/gen/pb/catalog/v1;catalogv1";

service PcPartService {
  rpc CreatePcPart(CreatePcPartRequest) returns (CreatePcPartResponse);
  rpc GetPcPart(GetPcPartRequest) returns (GetPcPartResponse);
  rpc UpdatePcPart(UpdatePcPartRequest) returns (UpdatePcPartResponse);
  rpc DeletePcPart(DeletePcPartRequest) returns (DeletePcPartResponse);
}

message CreatePcPartRequest {
  string id = 1;
  string name = 2;
  optional PcPartType type = 3;
  optional string manufacturer = 4;
}

message CreatePcPartResponse {
  PcPart pc_part = 1;
}

message GetPcPartRequest {
  string id = 1;
}

message GetPcPartResponse {
  PcPart pc_part = 1;
}

message UpdatePcPartRequest {
  PcPart pc_part = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdatePcPartResponse {
  PcPart pc_part = 1;
}

message DeletePcPartRequest {
  string id = 1;
  int64 version = 2;
}

message DeletePcPartResponse {
}