version: "2"
sql:
  - schema: "migrations/schema"
    queries: "internal/storage/sqlite/queries/*.sql"
    engine: "sqlite"
    gen:
      go:
        package: "sqlc"
        out: "internal/storage/sqlite/sqlc"
        emit_interface: true
        emit_json_tags: true
        overrides:
          - column: "*.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "*.created_at"
            go_type: "time.Time"